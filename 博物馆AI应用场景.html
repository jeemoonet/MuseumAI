<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>博物馆 AI 应用场景</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-deep: #14110e;
      --bg-surface: #1e1a16;
      --bg-card: #262018;
      --bg-card-hover: #2e281f;
      --border: rgba(201, 162, 39, 0.18);
      --border-strong: rgba(201, 162, 39, 0.35);
      --gold: #c9a227;
      --gold-light: #e8c84a;
      --gold-dim: rgba(201, 162, 39, 0.12);
      --bronze: #a67c52;
      --jade: #4a8c7a;
      --text-primary: #f2ebe0;
      --text-secondary: #a89f92;
      --text-muted: #6e655c;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      --radius: 14px;
      --font-serif: "Noto Serif SC", serif;
      --font-sans: "Noto Sans SC", sans-serif;
      --font-display: "Ma Shan Zheng", cursive;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 162, 39, 0.08), transparent),
        radial-gradient(ellipse 60% 40% at 100% 80%, rgba(74, 140, 122, 0.05), transparent),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 80px; }

    /* Header */
    header {
      padding: 56px 0 40px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
      background: var(--gold-dim);
    }

    header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 4.2rem);
      font-weight: 400;
      color: var(--gold-light);
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    header p {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 560px;
      margin: 0 auto 32px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .stat-item { text-align: center; }

    .stat-num {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 36px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(20, 17, 14, 0.92);
      backdrop-filter: blur(12px);
      padding: 16px 0;
      border-bottom: 1px solid transparent;
    }

    .controls.stuck { border-bottom-color: var(--border); }

    .search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .search-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 18px;
      height: 18px;
    }

    .search-wrap input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--border-strong); }
    .search-wrap input::placeholder { color: var(--text-muted); }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-btn i { width: 15px; height: 15px; }

    .filter-btn:hover {
      border-color: var(--border-strong);
      color: var(--text-primary);
      background: var(--gold-dim);
    }

    .filter-btn.active {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    /* Category sections */
    .category-section { margin-bottom: 48px; }

    .category-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .category-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .category-icon i { width: 22px; height: 22px; }

    .cat-visitor .category-icon { background: rgba(201, 162, 39, 0.15); color: var(--gold); }
    .cat-collection .category-icon { background: rgba(166, 124, 82, 0.15); color: var(--bronze); }
    .cat-curation .category-icon { background: rgba(139, 107, 168, 0.15); color: #b89fd4; }
    .cat-conservation .category-icon { background: rgba(74, 140, 122, 0.15); color: var(--jade); }
    .cat-operations .category-icon { background: rgba(91, 141, 184, 0.15); color: #7eb3d4; }
    .cat-marketing .category-icon { background: rgba(201, 120, 90, 0.15); color: #d4957a; }
    .cat-agent .category-icon { background: rgba(201, 162, 39, 0.2); color: var(--gold-light); }

    .category-header h2 {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-weight: 600;
    }

    .category-header span {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-left: auto;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 100px;
    }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s, background 0.25s;
      animation: fadeUp 0.5s ease both;
      cursor: pointer;
    }

    .card-body {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .card-image {
      width: 100%;
      height: 168px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background: var(--bg-deep);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
    }

    .card:hover .card-image img { transform: scale(1.04); }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--border-strong);
      background: var(--bg-card-hover);
      box-shadow: var(--shadow);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .card-expand-hint {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--gold);
      transition: gap 0.2s;
    }

    .card:hover .card-expand-hint { gap: 8px; }
    .card-expand-hint i { width: 14px; height: 14px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--gold-dim);
      color: var(--gold);
    }

    .card-icon i { width: 24px; height: 24px; }

    .card-meta { flex: 1; min-width: 0; }

    .card-num {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .card-title {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
    }

    .priority {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.68rem;
      color: var(--gold);
      margin-top: 4px;
    }

    .card-desc {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .card-value {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--jade);
    }

    .card-value i {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state i { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }

    /* Detail panel */
    .panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      backdrop-filter: blur(4px);
    }

    .panel-overlay.open { opacity: 1; visibility: visible; }

    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(520px, 100vw);
      height: 100vh;
      background: var(--bg-surface);
      border-left: 1px solid var(--border-strong);
      z-index: 201;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: -12px 0 48px rgba(0, 0, 0, 0.5);
    }

    .detail-panel.open { transform: translateX(0); }

    .panel-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 12px;
    }

    .panel-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gold-dim);
      color: var(--gold);
      flex-shrink: 0;
    }

    .panel-icon i { width: 26px; height: 26px; }

    .panel-title-wrap { flex: 1; min-width: 0; }

    .panel-num {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .panel-title {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .panel-close {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .panel-close:hover {
      border-color: var(--border-strong);
      color: var(--text-primary);
      background: var(--gold-dim);
    }

    .panel-close i { width: 18px; height: 18px; }

    .panel-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .panel-hero {
      width: 100%;
      height: 200px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
    }

    .panel-hero.visible { display: block; }

    .panel-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 32px;
    }

    .panel-body::-webkit-scrollbar { width: 6px; }
    .panel-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .detail-section { margin-bottom: 22px; }
    .detail-section:last-child { margin-bottom: 0; }

    .detail-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .detail-label i { width: 15px; height: 15px; }

    .detail-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .detail-list li {
      font-size: 0.88rem;
      color: var(--text-secondary);
      padding-left: 16px;
      position: relative;
      line-height: 1.55;
    }

    .detail-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--bronze);
    }

    .flow-list li::before {
      background: var(--gold);
      border-radius: 2px;
      width: 4px;
      height: 4px;
    }

    .detail-text {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .detail-tag {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .deploy-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .deploy-item {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
    }

    .deploy-item.full { grid-column: 1 / -1; }

    .deploy-key {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .deploy-val {
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    .detail-note {
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(201, 162, 39, 0.08);
      border: 1px solid var(--border);
      font-size: 0.84rem;
      color: var(--text-secondary);
      line-height: 1.6;
      display: flex;
      gap: 10px;
    }

    .detail-note i {
      width: 16px;
      height: 16px;
      color: var(--gold);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .detail-value-box {
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(74, 140, 122, 0.1);
      border: 1px solid rgba(74, 140, 122, 0.25);
      font-size: 0.88rem;
      color: var(--jade);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .detail-value-box i {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    body.panel-open { overflow: hidden; }

    footer {
      text-align: center;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .page { padding: 0 16px 60px; }
      header { padding: 36px 0 28px; }
      .stats { gap: 24px; }
      .cards-grid { grid-template-columns: 1fr; }
      .category-header span { display: none; }
      .deploy-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="header-badge">
        <i data-lucide="sparkles"></i>
        Museum AI Scenarios
      </div>
      <h1>博物馆 AI 应用场景</h1>
      <p>按服务对象与业务域划分，涵盖观众体验、藏品科研、策展展览、文物保护、运营管理、传播运营与智能体中枢七大方向。</p>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-num">45</div>
          <div class="stat-label">应用场景</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">7</div>
          <div class="stat-label">业务域</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">2</div>
          <div class="stat-label">服务对象</div>
        </div>
      </div>
    </header>

    <div class="controls" id="controls">
      <div class="search-wrap">
        <i data-lucide="search"></i>
        <input type="search" id="search" placeholder="搜索场景名称、描述或技术能力…" autocomplete="off" />
      </div>
      <div class="filters" id="filters"></div>
    </div>

    <main id="main"></main>

    <footer>
      积木网~企业原生AI解决方案供应商<br>
      <a href="https://jeemoo.com" target="_blank" rel="noopener noreferrer">jeemoo.com</a>
    </footer>
  </div>

  <div class="panel-overlay" id="panelOverlay"></div>
  <aside class="detail-panel" id="detailPanel" role="dialog" aria-modal="true" aria-labelledby="panelTitle">
    <div class="panel-header">
      <div class="panel-header-top">
        <div class="panel-icon" id="panelIcon"><i data-lucide="sparkles"></i></div>
        <div class="panel-title-wrap">
          <div class="panel-num" id="panelNum"></div>
          <h2 class="panel-title" id="panelTitle"></h2>
        </div>
        <button class="panel-close" id="panelClose" aria-label="关闭详情">
          <i data-lucide="x"></i>
        </button>
      </div>
      <p class="panel-desc" id="panelDesc"></p>
    </div>
    <div class="panel-hero" id="panelHero"><img id="panelHeroImg" src="" alt="" /></div>
    <div class="panel-body" id="panelBody"></div>
  </aside>

  <script src="博物馆AI场景详情.js"></script>

  <script>
    const categories = [
      { id: "all", label: "全部", icon: "layout-grid" },
      { id: "visitor", label: "观众体验", icon: "users", cls: "cat-visitor", tag: "To C" },
      { id: "collection", label: "藏品与科研", icon: "archive", cls: "cat-collection", tag: "To B" },
      { id: "curation", label: "策展与展览", icon: "frame", cls: "cat-curation", tag: "To B" },
      { id: "conservation", label: "文物保护", icon: "shield-check", cls: "cat-conservation", tag: "To B" },
      { id: "operations", label: "运营管理", icon: "building-2", cls: "cat-operations", tag: "To B" },
      { id: "marketing", label: "传播与运营", icon: "megaphone", cls: "cat-marketing", tag: "To C/B" },
      { id: "agent", label: "智能体中枢", icon: "bot", cls: "cat-agent", tag: "跨系统" },
    ];

    const scenarios = [

    let activeFilter = "all";
    let searchQuery = "";

    function renderFilters() {
      const container = document.getElementById("filters");
      container.innerHTML = categories.map(c => `
        <button class="filter-btn ${c.id === activeFilter ? "active" : ""}" data-cat="${c.id}">
          <i data-lucide="${c.icon}"></i>
          ${c.label}
        </button>
      `).join("");

      container.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeFilter = btn.dataset.cat;
          renderFilters();
          renderCards();
          lucide.createIcons();
        });
      });
    }

    function filterScenarios() {
      const q = searchQuery.toLowerCase().trim();
      return scenarios.filter(s => {
        if (activeFilter !== "all" && s.cat !== activeFilter) return false;
        if (!q) return true;
        const d = scenarioDetails[s.id];
        const hay = [
          s.title, s.desc, s.value, ...s.tech,
          ...(d ? [...d.users, ...d.features, ...d.flow, ...d.systems, d.techDetail, d.cases || "", d.notes || "", d.deploy.period, d.deploy.museums, d.deploy.prerequisites] : [])
        ].join(" ").toLowerCase();
        return hay.includes(q);
      });
    }

    function renderCard(s, delay) {
      const stars = s.priority > 0
        ? `<div class="priority">${"★".repeat(s.priority)}<span style="color:var(--text-muted);margin-left:4px">优先落地</span></div>`
        : "";
      const img = visitorImages[s.id];
      const imageHtml = img
        ? `<div class="card-image"><img src="${img}" alt="${s.title}应用场景示意图" loading="lazy" /></div>`
        : "";

      return `
        <article class="card" style="animation-delay:${delay}ms" data-id="${s.id}" role="button" tabindex="0" aria-label="查看${s.title}详情">
          ${imageHtml}
          <div class="card-body">
            <div class="card-top">
              <div class="card-icon"><i data-lucide="${s.icon}"></i></div>
              <div class="card-meta">
                <div class="card-num">场景 ${String(s.id).padStart(2, "0")}</div>
                <h3 class="card-title">${s.title}</h3>
                ${stars}
              </div>
            </div>
            <p class="card-desc">${s.desc}</p>
            <div class="card-tags">${s.tech.map(t => `<span class="tag">${t}</span>`).join("")}</div>
            <div class="card-footer">
              <div class="card-value">
                <i data-lucide="trending-up"></i>
                <span>${s.value}</span>
              </div>
              <span class="card-expand-hint">查看详情 <i data-lucide="chevron-right"></i></span>
            </div>
          </div>
        </article>
      `;
    }

    function renderDetailSection(icon, label, content) {
      return `
        <div class="detail-section">
          <div class="detail-label"><i data-lucide="${icon}"></i>${label}</div>
          ${content}
        </div>`;
    }

    function openPanel(id) {
      const s = scenarios.find(x => x.id === id);
      const d = scenarioDetails[id];
      if (!s || !d) return;

      const cat = categories.find(c => c.id === s.cat);
      document.getElementById("panelNum").textContent = `场景 ${String(s.id).padStart(2, "0")} · ${cat ? cat.label : ""}`;
      document.getElementById("panelTitle").textContent = s.title;
      document.getElementById("panelDesc").textContent = s.desc;
      document.getElementById("panelIcon").innerHTML = `<i data-lucide="${s.icon}"></i>`;

      const hero = document.getElementById("panelHero");
      const heroImg = document.getElementById("panelHeroImg");
      if (visitorImages[id]) {
        heroImg.src = visitorImages[id];
        heroImg.alt = `${s.title}应用场景示意图`;
        hero.classList.add("visible");
      } else {
        hero.classList.remove("visible");
        heroImg.src = "";
      }

      document.getElementById("panelBody").innerHTML = [
        renderDetailSection("users", "服务对象", `<ul class="detail-list">${d.users.map(u => `<li>${u}</li>`).join("")}</ul>`),
        renderDetailSection("list-checks", "核心功能", `<ul class="detail-list">${d.features.map(f => `<li>${f}</li>`).join("")}</ul>`),
        renderDetailSection("route", "使用流程", `<ul class="detail-list flow-list">${d.flow.map((f, i) => `<li>${i + 1}. ${f}</li>`).join("")}</ul>`),
        renderDetailSection("server", "依赖系统", `<div class="detail-tags">${d.systems.map(t => `<span class="detail-tag">${t}</span>`).join("")}</div>`),
        renderDetailSection("cpu", "技术方案", `<p class="detail-text">${d.techDetail}</p>`),
        renderDetailSection("trending-up", "业务价值", `<div class="detail-value-box"><i data-lucide="trending-up"></i><span>${s.value}</span></div>`),
        d.cases ? renderDetailSection("landmark", "参考案例", `<p class="detail-text">${d.cases}</p>`) : "",
        renderDetailSection("calendar-clock", "落地建议", `
          <div class="deploy-grid">
            <div class="deploy-item"><div class="deploy-key">建设周期</div><div class="deploy-val">${d.deploy.period}</div></div>
            <div class="deploy-item"><div class="deploy-key">适用馆型</div><div class="deploy-val">${d.deploy.museums}</div></div>
            <div class="deploy-item full"><div class="deploy-key">前置条件</div><div class="deploy-val">${d.deploy.prerequisites}</div></div>
            ${s.priority > 0 ? `<div class="deploy-item full"><div class="deploy-key">落地优先级</div><div class="deploy-val">${"★".repeat(s.priority)} 高优先级</div></div>` : ""}
          </div>`),
        d.notes ? renderDetailSection("alert-circle", "注意事项", `<div class="detail-note"><i data-lucide="alert-circle"></i><span>${d.notes}</span></div>`) : "",
      ].join("");

      document.getElementById("panelOverlay").classList.add("open");
      document.getElementById("detailPanel").classList.add("open");
      document.body.classList.add("panel-open");
      lucide.createIcons();
      document.getElementById("panelClose").focus();
    }

    function closePanel() {
      document.getElementById("panelOverlay").classList.remove("open");
      document.getElementById("detailPanel").classList.remove("open");
      document.body.classList.remove("panel-open");
    }

    function bindCardEvents() {
      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => openPanel(Number(card.dataset.id)));
        card.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openPanel(Number(card.dataset.id));
          }
        });
      });
    }

    function renderCards() {
      const main = document.getElementById("main");
      const filtered = filterScenarios();

      if (filtered.length === 0) {
        main.innerHTML = `
          <div class="empty-state">
            <i data-lucide="search-x"></i>
            <p>未找到匹配的场景，请尝试其他关键词或分类。</p>
          </div>`;
        lucide.createIcons();
        return;
      }

      if (activeFilter === "all" && !searchQuery) {
        main.innerHTML = categories
          .filter(c => c.id !== "all")
          .map(cat => {
            const items = filtered.filter(s => s.cat === cat.id);
            if (!items.length) return "";
            return `
              <section class="category-section ${cat.cls}">
                <div class="category-header">
                  <div class="category-icon"><i data-lucide="${cat.icon}"></i></div>
                  <h2>${cat.label}</h2>
                  <span>${cat.tag} · ${items.length} 个场景</span>
                </div>
                <div class="cards-grid">
                  ${items.map((s, i) => renderCard(s, i * 40)).join("")}
                </div>
              </section>`;
          }).join("");
      } else {
        main.innerHTML = `
          <section class="category-section">
            <div class="category-header">
              <div class="category-icon" style="background:var(--gold-dim);color:var(--gold)">
                <i data-lucide="filter"></i>
              </div>
              <h2>筛选结果</h2>
              <span>共 ${filtered.length} 个场景</span>
            </div>
            <div class="cards-grid">
              ${filtered.map((s, i) => renderCard(s, i * 30)).join("")}
            </div>
          </section>`;
      }

      lucide.createIcons();
      bindCardEvents();
    }

    document.getElementById("panelClose").addEventListener("click", closePanel);
    document.getElementById("panelOverlay").addEventListener("click", closePanel);
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closePanel();
    });

    document.getElementById("search").addEventListener("input", e => {
      searchQuery = e.target.value;
      renderCards();
    });

    const controls = document.getElementById("controls");
    window.addEventListener("scroll", () => {
      controls.classList.toggle("stuck", window.scrollY > 120);
    });

    renderFilters();
    renderCards();
  </script>
</body>
</html>
